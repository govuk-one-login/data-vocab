name: Publish release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages,
# creating releases and publishing packages.
permissions:
  contents: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-test.yml

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download JSON Schemas
        uses: actions/download-artifact@v8
        with:
          name: json-schemas
          path: v1/json-schemas

      # Use the git tag as the release name
      - name: Calculate release name
        id: release-name
        run: |
          echo "release_version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe #v2.6.1
        with:
          files: |
            v1/json-schemas/*
          tag_name: ${{ steps.release-name.outputs.release_version }}
          draft: false
          prerelease: false
          # the body is prepended to the release notes
          generate_release_notes: true
          body: |
            See the [npm package](https://github.com/govuk-one-login/data-vocab/pkgs/npm/data-vocab) for TypeScript types corresponding to this schema.

            The JSON Schema files are attached to this release.

  publish-ts-types:
    runs-on: ubuntu-latest
    needs: build
    environment: npmjs-publishing
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Publish Node ts-types package
        uses: ./.github/actions/npm-publish
        with:
          github-packages-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: ts-types
          artifact-path: code-generators/typescript-types/dist

  publish-ts-schemas:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment: npmjs-publishing
    steps:
      - uses: actions/checkout@v6
      - name: Publish Node ts-types package
        uses: ./.github/actions/npm-publish
        with:
          github-packages-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: ts-schemas
          artifact-path: code-generators/typescript-schemas/dist

  publish-java-types:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Use the git tag as the release name
      - name: Calculate release name
        id: release-name
        run: |
          TAG="${GITHUB_REF/refs\/tags\//}"
          echo "release_version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download combined schema
        uses: actions/download-artifact@v8
        with:
          name: combined-schema
          path: code-generators/java-types/schemas

      - name: Publish Maven artifact
        working-directory: code-generators/java-types
        run: |
          ./gradlew publish -Pversion="${{ steps.release-name.outputs.release_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
