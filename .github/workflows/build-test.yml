name: 'Build and test'

on:
  workflow_call:
  workflow_dispatch:
  # not running this on main as it's pulled in by the deploy workflow anyway
  # push:
  #   branches:
  #     - main
  pull_request:

permissions:
  contents: read

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: pipx install poetry
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: 'poetry'

      - name: Install Global JS dependencies
        run: npm install -g ajv-cli@5.0.0 ajv-formats@2.1.1

      - name: Install JS
        run: npm ci

      - name: Install Python
        run: poetry install

      - name: Build
        run: scripts/build

      - name: Run all tests
        run: scripts/test

      - name: Generate TypeScript types
        working-directory: scripts
        run: ./generate_ts_types.sh

      - name: Generate TypeScript schemas
        working-directory: scripts
        run: ./generate_ts_schemas.sh

      - name: Generate, build, and test Java types
        working-directory: scripts
        run: ./generate_java_types.sh

      - name: Upload site
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: site
          path: site
          retention-days: 1

      - name: Upload JSON Schemas
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: json-schemas
          path: v1/json-schemas
          retention-days: 1

      - name: Upload combined schema
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: combined-schema
          path: code-generators/java-types/schemas
          retention-days: 1

      - name: Upload TypeScript types
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ts-types
          path: code-generators/typescript-types/dist
          retention-days: 1

      - name: Upload TypeScript schemas
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ts-schemas
          path: code-generators/typescript-schemas/dist
          retention-days: 1
